name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Pytest
        env:
          # SQLite in-memory tests do not need a real Postgres; defaults from
          # app.core.settings are fine. Override the JWT key so tests do not
          # complain about the placeholder.
          JWT_SECRET_KEY: ci-test-secret-do-not-use-in-prod
          APP_ENV: test
          CI: "true"
        # Latency benchmarks are flaky on shared GitHub runners (timing ratios).
        run: pytest -q -m "not benchmark"

  frontend:
    name: Frontend (Flutter analyze)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # pubspec.lock requires Dart >=3.10 / Flutter >=3.35 (see sdks: section).
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: synapse-backend:ci

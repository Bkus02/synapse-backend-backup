services:
  db:
    image: postgres:16-alpine
    container_name: synapse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - synapse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    container_name: synapse-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["python", "-m", "app.ops", "apply-migrations"]
    restart: "no"

  api:
    build: .
    container_name: synapse-api
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SEQUENCE_DECAY_LAMBDA: ${SEQUENCE_DECAY_LAMBDA:-0.0077}
      SUNRISE_HOUR: ${SUNRISE_HOUR:-6}
      SUNSET_HOUR: ${SUNSET_HOUR:-19}
      PRE_SUNSET_LIGHT_PENALTY: ${PRE_SUNSET_LIGHT_PENALTY:-0.65}
      RECOMMENDATION_MAX_AGE_MINUTES: ${RECOMMENDATION_MAX_AGE_MINUTES:-5}
      HABIT_MATRIX_REBUILD_HOUR: ${HABIT_MATRIX_REBUILD_HOUR:-3}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env or environment}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  synapse-db-data:
